<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COHSEM | PARAKH - Review Questions</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #0a1a3a 0%, #1a3a6d 25%, #0c2461 50%, #1e3a5f 75%, #0a1a3a 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .header {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 20px 30px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .header h1 {
            color: white;
            font-size: 28px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header h1 i {
            color: #f1c40f;
        }
        .role-badge {
            background: rgba(52, 152, 219, 0.3);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .role-badge i {
            color: #3498db;
        }
        .header-right {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }
        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: none;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-primary {
            background: #3498db;
            color: white;
        }
        .btn-primary:hover {
            background: #2980b9;
        }
        .btn-success {
            background: #27ae60;
            color: white;
        }
        .btn-success:hover {
            background: #229954;
        }
        .btn-danger {
            background: #e74c3c;
            color: white;
        }
        .btn-danger:hover {
            background: #c0392b;
        }
        .btn-warning {
            background: #f39c12;
            color: white;
        }
        .btn-warning:hover {
            background: #e67e22;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
        }
        .stat-value {
            color: white;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 5px;
        }
        .stat-label {
            color: rgba(255, 255, 255, 0.7);
            font-size: 13px;
        }
        .filter-section {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }
        .filter-select {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 12px 15px;
            color: white;
            font-size: 14px;
            min-width: 150px;
            cursor: pointer;
        }
        .filter-select option {
            background: #2c3e50;
            color: white;
        }
        .filter-select optgroup {
            background: #2c3e50;
            color: white;
            font-weight: bold;
        }
        .filter-select optgroup option {
            padding-left: 20px;
        }
        .search-input {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 12px 15px;
            color: white;
            font-size: 14px;
            flex: 1;
            min-width: 250px;
        }
        .search-input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }
        .questions-list {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 20px;
        }
        .question-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            transition: all 0.3s ease;
        }
        .question-card:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: #3498db;
        }
        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 15px;
        }
        .question-meta {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge-grade {
            background: #3498db;
            color: white;
        }
        .badge-subject {
            background: #9b59b6;
            color: white;
        }
        .badge-under-review {
            background: #f39c12;
            color: white;
        }
        .badge-reviewed-completed {
            background: #00bcd4;
            color: white;
        }
        .badge-approved {
            background: #2ecc71;
            color: white;
        }
        .badge-rejected {
            background: #e74c3c;
            color: white;
        }
        .question-text {
            color: white;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 15px;
        }
        .answer-section {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
        }
        .answer-label {
            color: #3498db;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .answer-text {
            color: rgba(255, 255, 255, 0.9);
            font-size: 14px;
            line-height: 1.5;
        }
        .rejection-reason {
            background: rgba(231, 76, 60, 0.2);
            border-left: 3px solid #e74c3c;
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
        }
        .rejection-reason .label {
            color: #e74c3c;
            font-weight: 600;
            font-size: 12px;
            margin-bottom: 5px;
        }
        .rejection-reason .text {
            color: rgba(255, 255, 255, 0.8);
            font-size: 13px;
        }
        .question-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .user-info {
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
        }
        .user-info i {
            margin-right: 3px;
        }
        .action-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .action-btn {
            padding: 8px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .action-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-approve {
            background: #2ecc71;
            color: white;
        }
        .btn-approve:hover:not(:disabled) {
            background: #27ae60;
        }
        .btn-edit {
            background: #f39c12;
            color: white;
        }
        .btn-edit:hover:not(:disabled) {
            background: #e67e22;
        }
        .btn-review {
            background: #00bcd4;
            color: white;
        }
        .btn-review:hover:not(:disabled) {
            background: #00acc1;
        }
        .btn-rework {
            background: #f39c12;
            color: white;
        }
        .btn-rework:hover:not(:disabled) {
            background: #e67e22;
        }
        .empty-state {
            text-align: center;
            padding: 50px;
            color: rgba(255, 255, 255, 0.5);
        }
        .empty-state i {
            font-size: 60px;
            margin-bottom: 20px;
            opacity: 0.3;
        }
        .loading {
            text-align: center;
            padding: 50px;
            color: white;
        }
        .loading i {
            font-size: 40px;
            margin-bottom: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .permission-note {
            background: rgba(52, 152, 219, 0.2);
            border-left: 4px solid #3498db;
            padding: 12px 18px;
            margin-bottom: 20px;
            color: white;
            font-size: 14px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .permission-note i {
            color: #3498db;
            font-size: 18px;
        }
        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: white;
            border-radius: 15px;
            width: 90%;
            max-width: 550px;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        .modal-header {
            padding: 20px 30px;
            background: linear-gradient(135deg, #00bcd4, #00acc1);
            color: white;
            border-radius: 15px 15px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-header h3 {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .close-btn {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }
        .modal-body {
            padding: 30px;
        }
        .modal-body textarea {
            width: 100%;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
            resize: vertical;
            font-family: inherit;
        }
        .modal-body textarea:focus {
            outline: none;
            border-color: #00bcd4;
        }
        .modal-footer {
            padding: 20px 30px;
            border-top: 1px solid #eee;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }
        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
            .filter-section {
                flex-direction: column;
            }
            .filter-select, .search-input {
                width: 100%;
            }
            .question-header {
                flex-direction: column;
                align-items: flex-start;
            }
            .question-footer {
                flex-direction: column;
                align-items: flex-start;
            }
            .action-buttons {
                width: 100%;
                justify-content: space-between;
            }
            .permission-note {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="header">
        <h1>
            <i class="fas fa-check-circle"></i>
            My List
        </h1>
        <a href="https://parakh.ncert.gov.in/about-parakh" target="_blank" style="color: #ff2f2f; text-decoration: none; text-align: left;">🔗 Click here for more info</a>
        <div class="header-right">
            <div class="role-badge">
                <i class="fas fa-user-tag"></i> Role: <span id="userRoleDisplay">{{ user_role|upper }}</span>
                
            </div>
            <a href="/dashboard" class="btn btn-primary">
                <i class="fas fa-home"></i> Dashboard
            </a>
            <a href="/logout" class="btn btn-danger">
                <i class="fas fa-sign-out-alt"></i> Logout
            </a>
        </div>
    </div>
    <div class="permission-note" id="permissionNote">
        <i class="fas fa-info-circle"></i> 
        <span id="permissionText">Loading permissions...</span>
    </div>
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-value" id="totalCount">0</div>
            <div class="stat-label">Total Questions</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="underReviewCount">0</div>
            <div class="stat-label">Under Review</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="reviewedCompletedCount">0</div>
            <div class="stat-label">Reviewed Completed</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="approvedCount">0</div>
            <div class="stat-label">Approved</div>
        </div>
    </div>
    <div class="filter-section">
        <select class="filter-select" id="gradeFilter">
            <option value="">All Grades</option>
            <option value="1">Grade 11</option>
            <option value="2">Grade 12</option>
        </select>
        <select class="filter-select" id="subjectFilter">
            <option value="">All Subjects</option>
        </select>
        <select class="filter-select" id="statusFilter">
            <option value="">All Status</option>
            <option value="under_review">Under Review</option>
            <option value="reviewed_completed">Reviewed Completed</option>
            <option value="approved">Approved</option>
            <option value="rejected">Rejected</option>
        </select>
        <input type="text" class="search-input" id="searchInput" placeholder="Search questions...">
    </div>
    <div class="questions-list" id="questionsList">
        <div class="loading">
            <i class="fas fa-spinner fa-pulse"></i>
            <p>Loading questions...</p>
        </div>
    </div>
    <div class="modal" id="reviewModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-check-circle"></i> Mark as Reviewed Completed</h3>
                <button class="close-btn" onclick="closeReviewModal()">&times;</button>
            </div>
            <div class="modal-body">
                <textarea id="reviewComment" rows="4" placeholder="Enter review comment (optional)..."></textarea>
                <small style="color: #666;">This question will be marked as Reviewed Completed and sent to Approver.</small>
            </div>
            <div class="modal-footer">
                <button class="btn btn-danger" onclick="closeReviewModal()">Cancel</button>
                <button class="btn btn-primary" onclick="submitReview()">Mark as Reviewed Completed</button>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        let allQuestions = [];
        let subjects = [];
        let currentReviewId = null;
        let userRole = '{{ user_role }}';
        let isFetching = false;
        let lastFetchTime = 0;
        const MIN_FETCH_INTERVAL = 30000; // 30 seconds
        
        async function loadSubjects() {
            try {
                const response = await fetch('/api/subjects');
                const data = await response.json();
                subjects = data.subjects || [];
                console.log('Loaded subjects:', subjects);
                updateSubjectFilter();
            } catch (error) {
                console.error('Error loading subjects:', error);
            }
        }
        
        function updateSubjectFilter() {
            const gradeFilter = document.getElementById('gradeFilter');
            const selectedGrade = gradeFilter.value;
            const subjectFilter = document.getElementById('subjectFilter');
            
            let filteredSubjects = subjects;
            
            // Filter subjects by selected grade
            if (selectedGrade && selectedGrade !== '') {
                filteredSubjects = subjects.filter(s => s.grade_id == selectedGrade);
            }
            
            // Build the options
            let options = '<option value="">All Subjects</option>';
            
            if (selectedGrade === '') {
                // When "All Grades" is selected, group subjects by grade
                const grade1Subjects = filteredSubjects.filter(s => s.grade_id == 1);
                const grade2Subjects = filteredSubjects.filter(s => s.grade_id == 2);
                
                if (grade1Subjects.length > 0) {
                    options += '<optgroup label="📚 Grade 11">';
                    grade1Subjects.forEach(s => {
                        options += `<option value="${s.id}">${escapeHtml(s.subject_name)}</option>`;
                    });
                    options += '</optgroup>';
                }
                
                if (grade2Subjects.length > 0) {
                    options += '<optgroup label="📚 Grade 12">';
                    grade2Subjects.forEach(s => {
                        options += `<option value="${s.id}">${escapeHtml(s.subject_name)}</option>`;
                    });
                    options += '</optgroup>';
                }
            } else {
                // When a specific grade is selected, show subjects for that grade
                filteredSubjects.forEach(s => {
                    options += `<option value="${s.id}">${escapeHtml(s.subject_name)}</option>`;
                });
            }
            
            subjectFilter.innerHTML = options;
        }
        
        async function fetchQuestions(force = false) {
            if (isFetching) {
                console.log('Already fetching, skipping...');
                return;
            }
            const now = Date.now();
            if (!force && now - lastFetchTime < MIN_FETCH_INTERVAL) {
                console.log('Fetch too frequent, skipping...');
                return;
            }
            isFetching = true;
            lastFetchTime = now;
            try {
                const response = await fetch('/api/review-questions');
                const data = await response.json();
                allQuestions = data.questions || [];
                updatePermissionNote(data);
                updateStats();
                filterQuestions();
            } catch (error) {
                console.error('Error fetching questions:', error);
                document.getElementById('questionsList').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-circle"></i>
                        <h3>Error loading questions</h3>
                        <p>Please try again later</p>
                        <button class="btn btn-primary" onclick="fetchQuestions(true)" style="margin-top: 15px;">
                            <i class="fas fa-sync-alt"></i> Retry
                        </button>
                    </div>
                `;
            } finally {
                isFetching = false;
            }
        }
        
        function updatePermissionNote(data) {
            const note = document.getElementById('permissionText');
            const role = data.user_role || userRole;
            const roleDisplay = document.getElementById('userRoleDisplay');
            if (roleDisplay) roleDisplay.textContent = role.toUpperCase();
            let message = '';
            if (role === 'admin') {
                message = 'You have full access as Admin. You can edit, review, approve, and rework any question.';
            } else if (role === 'reviewer') {
                message = 'You are a Reviewer (RC permission). You can review questions under review.';
            } else if (role === 'approver') {
                message = 'You are an Approver (AP permission). You can approve reviewed completed questions and rework any question.';
            } else if (role === 'builder') {
                message = 'You are a Builder (RA permission). You can only view approved questions for building papers.';
            } else if (role === 'writer') {
                message = 'You are a Writer (RE permission). You can create, edit your own questions, and rework rejected ones.';
            } else {
                message = 'Welcome to the Question Review System.';
            }
            note.textContent = message;
        }
        
        function getStatusClass(status) {
            if (status === 'under_review') return 'badge-under-review';
            if (status === 'reviewed_completed') return 'badge-reviewed-completed';
            if (status === 'approved') return 'badge-approved';
            if (status === 'rejected') return 'badge-rejected';
            return 'badge-under-review';
        }
        
        function getStatusText(status) {
            if (status === 'under_review') return 'UNDER REVIEW';
            if (status === 'reviewed_completed') return 'REVIEWED COMPLETED';
            if (status === 'approved') return 'APPROVED';
            if (status === 'rejected') return 'REJECTED';
            return status.toUpperCase();
        }
        
        function updateStats() {
            const total = allQuestions.length;
            const underReview = allQuestions.filter(q => (q.status || 'under_review') === 'under_review').length;
            const reviewedCompleted = allQuestions.filter(q => q.status === 'reviewed_completed').length;
            const approved = allQuestions.filter(q => q.status === 'approved').length;
            document.getElementById('totalCount').textContent = total;
            document.getElementById('underReviewCount').textContent = underReview;
            document.getElementById('reviewedCompletedCount').textContent = reviewedCompleted;
            document.getElementById('approvedCount').textContent = approved;
        }
        
        function filterQuestions() {
            const gradeFilter = document.getElementById('gradeFilter').value;
            const subjectFilter = document.getElementById('subjectFilter').value;
            const statusFilter = document.getElementById('statusFilter').value;
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            const filtered = allQuestions.filter(q => {
                if (gradeFilter && q.grade_id != gradeFilter) return false;
                if (subjectFilter && q.subject_id != subjectFilter) return false;
                if (statusFilter && (q.status || 'under_review') !== statusFilter) return false;
                if (searchTerm && !q.question.toLowerCase().includes(searchTerm)) return false;
                return true;
            });
            displayQuestions(filtered);
        }
        
        function displayQuestions(questions) {
            const container = document.getElementById('questionsList');
            if (questions.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-inbox"></i>
                        <h3>No questions found</h3>
                        <p>Try adjusting your filters</p>
                    </div>
                `;
                return;
            }
            container.innerHTML = questions.map(q => {
                const status = q.status || 'under_review';
                const statusClass = getStatusClass(status);
                const statusText = getStatusText(status);
                const subjectObj = subjects.find(s => s.id == q.subject_id);
                const subjectName = subjectObj ? subjectObj.subject_name : q.subject || 'N/A';
                const rejectionHtml = q.rejection_reason ? `
                    <div class="rejection-reason">
                        <div class="label"><i class="fas fa-exclamation-triangle"></i> Rejection Reason:</div>
                        <div class="text">${escapeHtml(q.rejection_reason)}</div>
                    </div>
                ` : '';
                const reviewedCommentHtml = q.reviewed_comment ? `
                    <div class="review-comment" style="background: rgba(0,188,212,0.1); border-left: 3px solid #00bcd4; padding: 8px; margin: 8px 0; border-radius: 4px;">
                        <div class="label" style="color: #00bcd4; font-size: 11px;"><i class="fas fa-comment"></i> Review Comment:</div>
                        <div class="text" style="color: rgba(255,255,255,0.7); font-size: 12px;">${escapeHtml(q.reviewed_comment)}</div>
                    </div>
                ` : '';
                const showRework = (userRole === 'admin') ||
                                  (userRole === 'approver' && status !== 'approved') ||
                                  (userRole === 'writer' && q.can_rework === true);
                const showReview = (userRole === 'admin' || userRole === 'reviewer') && status === 'under_review';
                const showApprove = (userRole === 'admin' || userRole === 'approver') && status === 'reviewed_completed';
                const showEdit = (userRole === 'admin') || 
                                (userRole === 'writer' && q.can_edit === true) ||
                                (userRole === 'approver' && status !== 'approved');
                return `
                <div class="question-card" data-id="${q.id}">
                    <div class="question-header">
                        <div class="question-meta">
                            <span class="badge badge-grade">Grade ${q.grade || q.grade_name || 'N/A'}</span>
                            <span class="badge badge-subject">${escapeHtml(subjectName)}</span>
                            <span class="badge ${statusClass}">${statusText}</span>
                        </div>
                        <div class="question-meta">
                            <span class="badge" style="background: #00bcd4;">${q.question_type_name || 'Objective'}</span>
                            <span class="badge" style="background: #e67e22;">${q.marks || 1} marks</span>
                            ${q.duration_minutes ? `<span class="badge" style="background: #f39c12;">${q.duration_minutes} min</span>` : ''}
                        </div>
                    </div>
                    <div class="question-text">
                        <strong>Q:</strong> ${escapeHtml(q.question)}
                    </div>
                    <div class="answer-section">
                        <div class="answer-label">Answer:</div>
                        <div class="answer-text">${escapeHtml(q.answer || 'No answer provided')}</div>
                    </div>
                    ${reviewedCommentHtml}
                    ${rejectionHtml}
                    <div class="question-footer">
                        <div class="user-info">
                            <i class="fas fa-user"></i> ${escapeHtml(q.created_by || 'Unknown')} | 
                            <i class="fas fa-clock"></i> ${q.created_at ? new Date(q.created_at).toLocaleString() : 'Unknown'}
                            ${q.reviewed_by ? ` | <i class="fas fa-check-circle"></i> Reviewed by: ${escapeHtml(q.reviewed_by)}` : ''}
                            ${q.approved_by ? ` | <i class="fas fa-check-double"></i> Approved by: ${escapeHtml(q.approved_by)}` : ''}
                        </div>
                        <div class="action-buttons">
                            ${showEdit ? `
                                <button class="action-btn btn-edit" onclick="editQuestion(${q.id})">
                                    <i class="fas fa-edit"></i> Edit
                                </button>
                            ` : ''}
                            ${showReview ? `
                                <button class="action-btn btn-review" onclick="openReviewModal(${q.id})">
                                    <i class="fas fa-check-circle"></i> Mark Reviewed
                                </button>
                            ` : ''}
                            ${showApprove ? `
                                <button class="action-btn btn-approve" onclick="approveQuestion(${q.id})">
                                    <i class="fas fa-check"></i> Approve
                                </button>
                            ` : ''}
                            ${showRework ? `
                                <button class="action-btn btn-rework" onclick="reworkQuestion(${q.id})">
                                    <i class="fas fa-redo"></i> Rework & Resubmit
                                </button>
                            ` : ''}
                        </div>
                    </div>
                </div>
            `}).join('');
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        async function approveQuestion(id) {
            const result = await Swal.fire({
                title: 'Approve Question?',
                text: 'This question will be marked as approved and will be available in the Paper Builder',
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#2ecc71',
                cancelButtonColor: '#e74c3c',
                confirmButtonText: 'Yes, approve',
                input: 'textarea',
                inputPlaceholder: 'Optional comment...',
                inputLabel: 'Comment (optional)'
            });
            if (result.isConfirmed) {
                try {
                    const response = await fetch(`/api/approve-question/${id}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ comment: result.value || '' })
                    });
                    const data = await response.json();
                    if (data.success) {
                        Swal.fire('Approved!', 'Question has been approved.', 'success');
                        fetchQuestions(true);
                    } else {
                        Swal.fire('Error!', data.error || 'Failed to approve question', 'error');
                    }
                } catch (error) {
                    console.error('Error approving question:', error);
                    Swal.fire('Error!', 'Failed to approve question', 'error');
                }
            }
        }
        
        function openReviewModal(id) {
            currentReviewId = id;
            document.getElementById('reviewModal').classList.add('active');
        }
        
        function closeReviewModal() {
            document.getElementById('reviewModal').classList.remove('active');
            document.getElementById('reviewComment').value = '';
            currentReviewId = null;
        }
        
        async function submitReview() {
            const comment = document.getElementById('reviewComment').value;
            try {
                const response = await fetch(`/api/review-question/${currentReviewId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ comment: comment || '' })
                });
                const data = await response.json();
                if (data.success) {
                    Swal.fire('Reviewed!', 'Question has been marked as Reviewed Completed.', 'success');
                    closeReviewModal();
                    fetchQuestions(true);
                } else {
                    Swal.fire('Error!', data.error || 'Failed to review question', 'error');
                }
            } catch (error) {
                console.error('Error reviewing question:', error);
                Swal.fire('Error!', 'Failed to review question', 'error');
            }
        }
        
        async function editQuestion(id) {
            const question = allQuestions.find(q => q.id === id);
            if (!question) return;
            const { value: formValues } = await Swal.fire({
                title: 'Edit Question',
                html: `
                    <textarea id="swal-question" class="swal2-textarea" placeholder="Question" style="margin-bottom: 10px;">${escapeHtml(question.question)}</textarea>
                    <textarea id="swal-answer" class="swal2-textarea" placeholder="Answer" style="margin-bottom: 10px;">${escapeHtml(question.answer || '')}</textarea>
                    <div style="display: flex; gap: 10px;">
                        <input id="swal-marks" class="swal2-input" type="number" placeholder="Marks" value="${question.marks || 1}" min="1" max="100" style="flex: 1;">
                        <input id="swal-duration" class="swal2-input" type="number" placeholder="Duration (minutes)" value="${question.duration_minutes || 0}" min="0" max="180" style="flex: 1;">
                    </div>
                `,
                focusConfirm: false,
                showCancelButton: true,
                confirmButtonColor: '#f39c12',
                confirmButtonText: 'Save',
                preConfirm: () => {
                    const newQuestion = document.getElementById('swal-question').value;
                    const newAnswer = document.getElementById('swal-answer').value;
                    const newMarks = parseInt(document.getElementById('swal-marks').value);
                    const newDuration = parseInt(document.getElementById('swal-duration').value);
                    if (!newQuestion) {
                        Swal.showValidationMessage('Question text is required');
                        return false;
                    }
                    if (!newAnswer) {
                        Swal.showValidationMessage('Answer is required');
                        return false;
                    }
                    if (isNaN(newMarks) || newMarks < 0 || newMarks > 100) {
                        Swal.showValidationMessage('Marks must be between 0 and 100');
                        return false;
                    }
                    return {
                        question: newQuestion,
                        answer: newAnswer,
                        marks: newMarks,
                        duration_minutes: newDuration
                    };
                }
            });
            if (formValues) {
                try {
                    const response = await fetch(`/api/update-question/${id}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(formValues)
                    });
                    const data = await response.json();
                    if (data.success) {
                        Swal.fire('Updated!', 'Question has been updated.', 'success');
                        fetchQuestions(true);
                    } else {
                        Swal.fire('Error!', data.error || 'Failed to update question', 'error');
                    }
                } catch (error) {
                    console.error('Error updating question:', error);
                    Swal.fire('Error!', 'Failed to update question', 'error');
                }
            }
        }
        
        async function reworkQuestion(id) {
    const question = allQuestions.find(q => q.id === id);
    if (!question) {
        Swal.fire('Error', 'Question not found', 'error');
        return;
    }
    
    const reasonDisplay = question.rejection_reason ? 
        `<div style="margin-bottom: 15px; background: #fff3e0; padding: 12px; border-radius: 8px; border-left: 4px solid #f39c12; text-align: left;">
            <strong style="color: #e67e22;">Previous Rejection Reason:</strong><br>
            <span style="color: #666;">${escapeHtml(question.rejection_reason)}</span>
        </div>` : '';
    
    const { value: formValues } = await Swal.fire({
        title: 'Rework & Resubmit',
        html: `
            <div style="max-height: 400px; overflow-y: auto; padding-right: 10px; text-align: left;">
                ${reasonDisplay}
                
                <div style="margin-bottom: 12px;">
                    <label style="display: block; font-weight: bold; margin-bottom: 5px;">Question *</label>
                    <textarea id="swal-question" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;" rows="2">${escapeHtml(question.question)}</textarea>
                </div>
                
                <div style="margin-bottom: 12px;">
                    <label style="display: block; font-weight: bold; margin-bottom: 5px;">Answer *</label>
                    <textarea id="swal-answer" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;" rows="2">${escapeHtml(question.answer || '')}</textarea>
                </div>
                
                <div style="display: flex; gap: 10px; margin-bottom: 12px;">
                    <div style="flex: 1;">
                        <label style="display: block; font-weight: bold; margin-bottom: 5px;">Marks *</label>
                        <input id="swal-marks" type="number" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;" value="${question.marks || 1}" min="1" max="100">
                    </div>
                    <div style="flex: 1;">
                        <label style="display: block; font-weight: bold; margin-bottom: 5px;">Duration (min)</label>
                        <input id="swal-duration" type="number" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;" value="${question.duration_minutes || 0}" min="0" max="180">
                    </div>
                </div>
                
                <div style="margin-bottom: 5px;">
                    <label style="display: block; font-weight: bold; margin-bottom: 5px; color: #e74c3c;">Rework Comment *</label>
                    <textarea id="swal-comment" style="width: 100%; padding: 8px; border: 2px solid #e74c3c; border-radius: 4px; background: #fff5f5;" rows="3" placeholder="Please explain what changes you made..."></textarea>
                    <small style="color: #e74c3c;">Comment is required</small>
                </div>
            </div>
        `,
        focusConfirm: false,
        showCancelButton: true,
        confirmButtonColor: '#f39c12',
        confirmButtonText: 'Save & Resubmit',
        cancelButtonText: 'Cancel',
        width: '550px',
        preConfirm: () => {
            const newQuestion = document.getElementById('swal-question')?.value;
            const newAnswer = document.getElementById('swal-answer')?.value;
            const newMarks = parseInt(document.getElementById('swal-marks')?.value);
            const newDuration = parseInt(document.getElementById('swal-duration')?.value);
            const comment = document.getElementById('swal-comment')?.value.trim();
            
            if (!newQuestion) {
                Swal.showValidationMessage('Question is required');
                return false;
            }
            if (!newAnswer) {
                Swal.showValidationMessage('Answer is required');
                return false;
            }
            if (isNaN(newMarks) || newMarks < 0 || newMarks > 100) {
                Swal.showValidationMessage('Marks must be between 0-100');
                return false;
            }
            if (!comment) {
                Swal.showValidationMessage('Rework comment is required');
                return false;
            }
            
            return {
                question: newQuestion,
                answer: newAnswer,
                marks: newMarks,
                duration: newDuration,
                comment: comment
            };
        }
    });
    
    if (formValues) {
        try {
            Swal.fire({
                title: 'Submitting...',
                allowOutsideClick: false,
                didOpen: () => Swal.showLoading()
            });
            
            const updateResponse = await fetch(`/api/update-question/${id}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    question: formValues.question,
                    answer: formValues.answer,
                    marks: formValues.marks,
                    duration_minutes: formValues.duration
                })
            });
            const updateData = await updateResponse.json();
            
            if (!updateData.success) {
                Swal.fire('Error!', updateData.error || 'Update failed', 'error');
                return;
            }
            
            const reworkResponse = await fetch(`/api/rework-question/${id}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ comment: formValues.comment })
            });
            const reworkData = await reworkResponse.json();
            
            if (reworkData.success) {
                Swal.fire('Success!', 'Question resubmitted for review', 'success');
                fetchQuestions(true);
            } else {
                Swal.fire('Error!', reworkData.error || 'Resubmit failed', 'error');
            }
        } catch (error) {
            Swal.fire('Error!', 'Something went wrong', 'error');
        }
    }
}
        
        // Event Listeners
        document.getElementById('gradeFilter').addEventListener('change', function() {
            updateSubjectFilter();
            filterQuestions();
        });
        document.getElementById('subjectFilter').addEventListener('change', filterQuestions);
        document.getElementById('statusFilter').addEventListener('change', filterQuestions);
        document.getElementById('searchInput').addEventListener('input', filterQuestions);
        
        document.addEventListener('DOMContentLoaded', () => {
            loadSubjects().then(() => {
                fetchQuestions(true);
            });
        });
        
        setInterval(() => fetchQuestions(false), 60000);
    </script>
</body>
